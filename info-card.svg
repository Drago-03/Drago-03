  <rect width="490" height="34" fill="#161b22"/>
  <circle cx="18" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="38" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="58" cy="17" r="6" fill="#27c93f"/>
