<svg xmlns="http://www.w3.org/2000/svg" width="490" height="296" viewBox="0 0 490 296" font-family="SFMono-Regular, Consolas, Menlo, monospace">
<style>
.row{opacity:0;transform:translateX(-10px);transform-box:fill-box;transform-origin:left;animation:fadeSlide 0.35s ease-out forwards;}
